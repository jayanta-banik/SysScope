name: build-distributions

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: Linux distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest
      - name: Build Linux executable
        run: pyinstaller --clean --noconfirm SysScope.spec
      - name: Package Linux distribution
        run: |
          chmod +x dist/SysScope
          tar -czf dist/SysScope-linux-x86_64.tar.gz -C dist SysScope
      - uses: actions/upload-artifact@v4
        with:
          name: SysScope-linux-x86_64
          path: dist/SysScope-linux-x86_64.tar.gz
          if-no-files-found: error

  windows:
    name: Windows distributions
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest
      - name: Build Windows executable
        run: pyinstaller --clean --noconfirm SysScope.spec
      - name: Package standalone Windows executable
        shell: pwsh
        run: Compress-Archive -Path dist\SysScope.exe -DestinationPath dist\SysScope-windows-x86_64.zip
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y
      - name: Build Windows installer
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\windows\SysScope.iss'
      - uses: actions/upload-artifact@v4
        with:
          name: SysScope-windows-x86_64
          path: |
            dist/SysScope-windows-x86_64.zip
            dist/installer/SysScope-Windows-Setup.exe
          if-no-files-found: error

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --generate-notes --title "$GITHUB_REF_NAME"
